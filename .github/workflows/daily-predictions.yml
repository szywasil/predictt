name: Daily Football Value Bets

on:
  schedule:
    - cron: '0 7 * * *'      # Codziennie o 7:00 UTC (9:00 w Polsce latem)
  workflow_dispatch:         # Możliwość ręcznego uruchomienia

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run predictions + Value Bets
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python main.py --predict --odds --leagues PL,PD,SA,BL1,FL1 --days 10

      - name: Generate HTML page
        run: python generate_html.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_orphan: true
